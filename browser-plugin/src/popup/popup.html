<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project NINK Proof Anchor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="header-row">
        <h1>Project NINK Proof Anchor</h1>
        <span id="dev-mode-badge" class="dev-badge" hidden>[Local Dev Mode]</span>
      </div>
      <p class="subtitle">Local encryption and L2 session anchoring</p>
    </header>

    <label class="dev-toggle">
      <input id="dev-stub-toggle" type="checkbox">
      <span>Mock mode — skip blockchain entirely (fastest testing)</span>
    </label>

    <section id="onchain-panel" class="metrics-card onchain-panel" aria-live="polite" hidden>
      <div class="metric-row">
        <span class="metric-label">On-chain NINK</span>
        <span class="metric-value"><span id="onchain-balance-display">—</span></span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Anchor fee (registry)</span>
        <span class="metric-value"><span id="onchain-fee-display">—</span> NINK</span>
      </div>
      <p id="onchain-wallet-label" class="onchain-note">Reading balance from token contract…</p>
      <p id="chain-health-label" class="onchain-note"></p>
    </section>

    <section class="metrics-card" aria-live="polite" id="mock-metrics-panel">
      <div class="metric-row">
        <span class="metric-label">Balance</span>
        <span class="metric-value"><span id="balance-display">0.0000</span> NINK</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Cost Per Action</span>
        <span class="metric-value"><span id="fee-display">0.0000</span> NINK</span>
      </div>
    </section>

    <button id="sign-off-btn" type="button">Press NINK to Sign-Off</button>
    <button id="wallet-setup-btn" type="button" class="secondary-btn" hidden>Advanced: MetaMask setup (optional)</button>
    <div id="status-console" class="status-console" role="status"></div>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
